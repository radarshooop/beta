<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Loja Amazon</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui,
        -system-ui, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    /* ===== HEADER ===== */

    .site-header {
      position: sticky;          /* Fica grudado no topo ao rolar */
      top: 0;
      z-index: 1000;
    }

    /* Barra fina superior */
    .top-bar {
      background-color: #fafafd;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      height: 28px;              /* mais fina */
      display: flex;
      align-items: center;
      transition: transform 0.3s ease, opacity 0.2s ease;
    }

    .top-bar-content {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6e6e73;
    }

    /* Barra principal com blur */
    .main-nav {
      position: sticky;
      top: 0; /* gruda no topo quando a top-bar "sobe" */
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(250, 250, 253, 0.75);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .main-nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 48px;                        /* um pouco mais alta que top-bar */
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }

    /* Logo */
    .logo span {
      font-size: 20px;
    }

    /* Menu */
    .menu {
      display: flex;
      gap: 24px;
    }

    .menu a {
      text-decoration: none;
      color: #1d1d1f;
      padding: 4px 0;
      transition: color 0.2s ease;
    }

    .menu a:hover {
      color: #0071e3;
    }

    /* Ações (ícones à direita) */
    .actions {
      display: flex;
      gap: 12px;
    }

    .icon-button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
    }

    /* ===== Comportamento da top-bar ao rolar ===== */
    .site-header.scrolled .top-bar {
      transform: translateY(-100%);
      opacity: 0;
    }

    /* ===== Conteúdo de teste ===== */
    .page-content {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }

    .page-content h1 {
      margin-bottom: 16px;
    }

    .dummy-block {
      height: 600px;
      margin-top: 32px;
      background: linear-gradient(135deg, #ffffff, #e5e5ea);
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <!-- Barra fina superior -->
    <div class="top-bar">
      <div class="top-bar-content">
        <span>Minha Loja Amazon</span>
        <span>Ofertas do dia</span>
      </div>
    </div>

    <!-- Barra principal com blur -->
    <div class="main-nav" id="mainNav">
      <div class="main-nav-content">
        <div class="logo">
          <!-- Pode trocar por uma imagem depois -->
          <span></span>
        </div>

        <nav class="menu">
          <a href="#">Início</a>
          <a href="#">Eletrônicos</a>
          <a href="#">Casa</a>
          <a href="#">Games</a>
          <a href="#">Livros</a>
          <a href="#">Ofertas</a>
        </nav>

        <div class="actions">
          <button class="icon-button">🔍</button>
          <button class="icon-button">🛒</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Conteúdo fictício só para testar o scroll -->
  <main class="page-content">
    <h1>Conteúdo da página</h1>
    <p>
      Role a página para ver a barra superior sumir
      e a barra principal permanecer fixa com o blur.
    </p>

    <div class="dummy-block"></div>
    <div class="dummy-block"></div>
    <div class="dummy-block"></div>
  </main>

  <script>
    // Esconde a top-bar quando o usuário rolar um pouco a página
    const header = document.querySelector(".site-header");

    window.addEventListener("scroll", () => {
      const currentScroll = window.scrollY;

      if (currentScroll > 40) {
        header.classList.add("scrolled");
      } else {
        header.classList.remove("scrolled");
      }
    });
  </script>
</body>
</html>
