<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Loja Amazon</title>

  <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui,
      -system-ui, "Segoe UI", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
  }

  /* ===== HEADER ===== */

  .site-header {
    position: fixed;   /* fixo no topo da janela */
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
  }

  /* Barra fina superior */
.top-bar {
  background-color: #fafafd;
  /* removida a borda inferior */
  height: 28px;
  display: flex;
  align-items: center;
  transition: transform 0.3s ease, opacity 0.2s ease;
}

.top-bar-content {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  justify-content: flex-end; /* alinhado à direita */
  font-size: 12px;
  color: #6e6e73;
}

  /* Barra principal com blur */
  .main-nav {
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    background: rgba(250, 250, 253, 0.75);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    transition: transform 0.3s ease;
  }

  .main-nav-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 48px;                        /* um pouco mais alta que top-bar */
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
  }

  /* Logo */
  .logo span {
    font-size: 20px;
  }

  /* Menu */
  .menu {
    display: flex;
    gap: 24px;
  }

  .menu a {
    text-decoration: none;
    color: #1d1d1f;
    padding: 4px 0;
    transition: color 0.2s ease;
  }

  .menu a:hover {
    color: #0071e3;
  }

  /* Ações (ícones à direita) */
  .actions {
    display: flex;
    gap: 12px;
  }

  .icon-button {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 16px;
  }

  /* ===== Comportamento ao rolar ===== */

  /* Esconde só a barra de cima */
  .site-header.scrolled .top-bar {
    transform: translateY(-100%);
    opacity: 0;
  }

  /* Faz a barra 2 subir ocupando o lugar da 1 */
  .site-header.scrolled .main-nav {
    transform: translateY(-28px); /* exatamente a altura da top-bar */
  }

  /* ===== Conteúdo de teste ===== */

  /* adiciona padding-top para não ficar escondido atrás do header fixo */
  .page-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 24px 80px; /* 28px + 48px ~ 76px -> arredondei para 80 */
  }

  .page-content h1 {
    margin-bottom: 16px;
  }

  .dummy-block {
    height: 600px;
    margin-top: 32px;
    background: linear-gradient(135deg, #ffffff, #e5e5ea);
    border-radius: 16px;
  }
</style>
</head>
<body>
  <header class="site-header">
    <!-- Barra fina superior -->
    <div class="top-bar">
      <div class="top-bar-content">
        <span>Como associado da Amazon, ganho comissões por compras qualificadas.</span>
      </div>
    </div>

    <!-- Barra principal com blur -->
    <div class="main-nav" id="mainNav">
      <div class="main-nav-content">
        <div class="logo">
          <!-- Pode trocar por uma imagem depois -->
          <span></span>
        </div>

        <nav class="menu">
          <a href="#">Início</a>
          <a href="#">Eletrônicos</a>
          <a href="#">Casa</a>
          <a href="#">Games</a>
          <a href="#">Livros</a>
          <a href="#">Ofertas</a>
        </nav>

        <div class="actions">
          <button class="icon-button">🔍</button>
          <button class="icon-button">🛒</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Conteúdo fictício só para testar o scroll -->
  <main class="page-content">
    <h1>Conteúdo da página</h1>
    <p>
      Role a página para ver a barra superior sumir
      e a barra principal permanecer fixa com o blur.
    </p>

    <div class="dummy-block"></div>
    <div class="dummy-block"></div>
    <div class="dummy-block"></div>
  </main>

  <script>
    // Esconde a top-bar quando o usuário rolar um pouco a página
    const header = document.querySelector(".site-header");

    window.addEventListener("scroll", () => {
      const currentScroll = window.scrollY;

      if (currentScroll > 40) {
        header.classList.add("scrolled");
      } else {
        header.classList.remove("scrolled");
      }
    });
  </script>
</body>
</html>
